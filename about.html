<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>携帯農薬検索実験室</title>
<link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" sizes="180x180">
<link rel="icon" type="image/png" href="/android-chrome-192x192.png" sizes="192x192">
<link rel="stylesheet" type="text/css" href="/macs/style.macs.css" />
<script type="text/javascript" src="/setup.js"></script>
<script type="text/javascript" src="/common.js"></script>
<script>
const style = `
.main p, .main ul {
  margin: 0.5em 0.7rem;
}
`;

const head = `
<h1>${sitename}</h1>
<h2>${branch}</h2>
<h3>このサイトについて</h3>
`;

let intro = `
<p>　普及指導員や営農指導員は、現場で病害虫診断して防除指導を行うことが多く、この際には各都道府県で作成している病害虫防除基準等に基づいて薬剤選定などを行っていますが、紙媒体の病害虫防除基準を作成しない都道府県も増えてきており、現場活動においても携帯端末から農薬登録情報にアクセスできるようにすることが重要になっています。
しかし、農水省の農薬登録情報提供システムをはじめとして、PC 用のウェブブラウザで利用可能な農薬登録情報検索システムはいくつかありますが、スマホや小型タブレットなどでは画面が小さすぎて非常に使いにくいのが現状です。</p>
<p>　そこで、本サイトでは、普及指導員や営農指導員の方々の現場での農薬適正使用指導を支援するため、携帯端末でも使いやすい農薬登録情報等検索システムの開発と、本サイトで利用しているデータの公開を行っています。
また、HTML5 に対応したモダンブラウザさえ動作すれば OS に全く依存しない、新たな農薬検索システム ACFinder Browser Edition (ACFinderBE) のサービスも提供しています。</p>
`;

if (branch != '本室') intro = `<p>　「<a href="${rootsite}">${sitename}本室</a>」では、普及指導員や営農指導員の方々の現場での農薬適正使用指導を支援するため、携帯端末でも使いやすい農薬登録情報等検索システムを開発しています。「${branch}」では、本室が開発した検索システム及び農薬登録情報等のデータを公開しています。また、HTML5 に対応したモダンブラウザさえ動作すれば OS に全く依存しない、新たな農薬検索システム ACFinder Browser Edition (ACFinderBE) のサービスも提供しています。\n`;
if (window.location.href.includes('github.io')) intro += `<p>　なお、「${branch}」は、実サーバ環境を持たずに無料プランのクラウド上で運用するデモサイトとなっています。\n`;

const main = `
<div class="main">
<h4>はじめに</h4>
${intro}
<h4>本サイトのデータの特長</h4>
<ul>
<li>作物名、病害虫・雑草名は、農薬登録上の名称だけでなく、一般的によく使われる別名(「デコポン」「イネアオムシ」等)も紐づけています。</li>
<li>作物名、病害虫・雑草名及びその別名には、全てよみがなも紐づけています。</li>
<li>RAC コードや化学的系統分類、作用機構など、農薬選択に必要な付加情報が豊富です。</li>
</ul>
<h4>本サイトの検索システムの特長(共通)</h4>
<ul>
<li>作物名・病害虫・雑草名は、農薬登録上の名称だけでなく、一般的によく使われる別名でも検索可能です。</li>
<li>漢字の作物名、病害虫・雑草名、別名及び農薬名でも、「ひらがな」「カタカナ」「romaji」で検索可能です。</li>
<li>濁点・半濁点(「バ」「パ」)の同一視、長音記号(「ー」)や促音(「っ」)の省略、「ゅ」「っ」と「ゆ」「つ」、「ファ」「ヴォ」と「ハ」「ボ」の同一視など、様々な表記の揺れに対応しています。</li>
<li>「薬剤名等からの検索」で、農薬名・有効成分名だけでなく、RAC コードや作用部位、作用機構による検索が可能です。</li>
<li>適用表示の際に、RAC コードだけでなく、化学的系統分類や作用機構など各種付加情報を表示します。</li>
<li>アプリのインストール不要で、サイトにアクセスするだけで常に最新の検索システムとデータが利用可能です。</li>
<li>HTML5 に対応したモダンブラウザさえ動作すれば OS に全く依存しないため、Windows、macOS、iOS、Android など、様々な OS の様々なブラウザで利用可能です。</li>
</ul>
<h4>ACFinder Browser Edition (ACFinderBE)の特長</h4>
<ul>
<li>データをローカルに保存して検索から結果表の表示まで全てローカルで行うので、サーバやインターネット接続が不安定な場合でも高速に検索できます。</li>
<li>Windows 版 ACFinder にはなかった Excel ライクなフィルタリングや列の入れ替え／非表示など高機能で使いやすい結果表を搭載し、防除資料等の作成に最適です。</li>
<li>PC や大画面タブレットでの利用に向いています。</li>
</ul>
<h4>携帯農薬検索システム(MACS)の特長</h4>
<ul>
<li>検索から結果表の表示まで全てサーバで行うため、古い携帯端末でも高速に検索できます。</li>
<li>スマホや小型タブレットなど画面が小さい携帯端末でも使いやすいインターフェースで、現場での農薬適正使用指導に最適です。</li>
<li>最小の入力で最大の情報が得られるように、検索結果の表示に工夫を凝らしています。</li>
</ul>
<h4>ACFinder Standalone Edition (ACFinderSE)について</h4>
<p>　ACFinderBE や MACS はシステムの仕組み上、利用する際にはインターネット接続が必須のため、モバイル通信環境が不安定な現場では利用が困難です。
このため、ACFinderBE を完全オフライン環境でも使用可能にしたアプリが ACFinderSE です。
Windwws 専用のデスクトップアプリとなりますが、モバイル通信機能を持たないノート PC や通信環境が不安定な地域での現場利用に最適です。
ACFinderSE は、「<a href="https://acfinder.kabe.info/doku.php?id=se" target="_blank">ACFinder 公式サイト</a>」からダウンロードして利用することができます。</p>
<h4>検索システム及びデータの利用</h4>
<p>　欄外の注意事項をご了承いただければ、誰でも自由に無料で本サイトの検索システムやデータを利用することができます。
ただし、本サイトのデータを使用したウェブ検索システム等で不特定多数が使用するような場合は、別途 FAMIC の許諾を得る必要があります。</p>
<h4>サポート</h4>
<p>　本サイトの検索システムや公開データ、さらに ACFinderSE に関するサポートは、facebook の「<a href="https://www.facebook.com/groups/272174746319343/" target="_blank">農薬検索研究会</a>」グループで実施しています。
ご質問やご意見・ご要望等がある場合は、研究会にご参加ください。</p>
</div>`;

const navi = `<p><button type="button" class="back" onclick="location.href='./'">≪ 戻る</button></p>\n`;

</script>
