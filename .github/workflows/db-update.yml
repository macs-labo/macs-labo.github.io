name: Manual and Scheduled Database Update

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Update Target'
        required: true
        default: 'both'
        type: choice
        options: [acis, spec, both]
      force_update:
        description: 'Force update (add update=1)'
        type: boolean
        default: false

  # スケジュール実行（自動実行時は通常強制更新にしない設定にしています）
  schedule:
    - cron: '0 20 * * *'

permissions:
  contents: write

jobs:
  update-db:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, sqlite3, pdo_sqlite

      # 1. spec.db の更新
      - name: Update spec.db
        if: ${{ github.event.inputs.target == 'spec' || github.event.inputs.target == 'both' || github.event_name == 'schedule' }}
        run: |
          cd cron
          # 手動実行でチェックが入っている場合は引数を付与
          if [[ "${{ github.event.inputs.force_update }}" == "true" ]]; then
            php .make.spec.php "update=1"
          else
            php .make.spec.php
          fi

      # 2. acis.db の更新
      - name: Update acis.db
        if: ${{ github.event.inputs.target == 'acis' || github.event.inputs.target == 'both' || github.event_name == 'schedule' }}
        run: |
          cd cron
          if [[ "${{ github.event.inputs.force_update }}" == "true" ]]; then
            php .make.acis.php "update=1"
          else
            php .make.acis.php
          fi

      # 3. コミットとプッシュ
      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add cron/*.db data/*.zip data/*.txt
          if ! git diff --staged --quiet; then
            git commit -m "Update DB and data files via GitHub Actions (Force: ${{ github.event.inputs.force_update }})"
            git push
          else
            echo "No changes to commit"
          fi
