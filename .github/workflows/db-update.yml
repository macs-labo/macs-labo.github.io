name: Manual Database Update

on:
  # 手動実行を可能にする設定
  workflow_dispatch:
    inputs:
      target:
        description: '更新するデータベースを選択してください'
        required: true
        default: 'both'
        type: choice
        options:
          - acis
          - spec
          - both

jobs:
  update-db:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2' # サーバー環境に合わせて調整してください

      # acis.db の更新 (acis または both が選ばれたとき)
      - name: Update acis.db
        if: ${{ github.event.inputs.target == 'acis' || github.event.inputs.target == 'both' }}
        run: php cron/.make.acis.php

      # spec.db の更新 (spec または both が選ばれたとき)
      - name: Update spec.db
        if: ${{ github.event.inputs.target == 'spec' || github.event.inputs.target == 'both' }}
        run: php cron/.make.spec.php
