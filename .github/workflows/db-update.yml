name: Manual Database Update

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Update Target'
        required: true
        default: 'both'
        type: choice
        options: [acis, spec, both]

jobs:
  update-db:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          #extensions: mbstring, sqlite3, pdo_sqlite

      # ここを追加！
      - name: Check PHP and SQLite Version
        run: |
          php -v
          php -r 'echo "SQLite3 Library Version: " . SQLite3::version()["versionString"] . "\n";'
          php -i | grep -i sqlite
          # もし詳細が全部必要なら php -i だけでもOKです

      - name: Update acis.db
        if: ${{ github.event.inputs.target == 'acis' || github.event.inputs.target == 'both' }}
        run: |
          cd cron
          php .make.acis.php
        # 失敗してもエラーログを見たい場合はここをチェック

      - name: Update spec.db
        if: ${{ github.event.inputs.target == 'spec' || github.event.inputs.target == 'both' }}
        run: |
          cd cron
          php .make.spec.php

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add cron/*.db
          # ファイルに変更がある場合のみコミット
          git diff --staged --quiet || (git commit -m "Update databases via GitHub Actions" && git push)
