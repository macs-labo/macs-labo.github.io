name: Manual and Scheduled Database Update

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Update Target'
        required: true
        default: 'spec'
        type: choice
        options: [spec, acis, both]
      force_update:
        description: 'Force update (add update=1)'
        type: boolean
        default: false

  # スケジュール実行
  #schedule:
  #  - cron: '2 0-6 * * 1-5' # 月-金 9-17時 02分 (JST)

permissions:
  contents: write
  pages: write       # Pages のデプロイに必要
  id-token: write    # デプロイ時の認証に必要

jobs:
  update-db:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # タイムスタンプ復元に必要

      - name: Restore timestamps
        uses: chetan/git-restore-mtime-action@v2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, sqlite3, pdo_sqlite

      - name: Set Global Environment Variables
        id: vars  # id を追加
        run: |
          if [[ "${{ github.event.inputs.force_update }}" == "true" ]]; then
            echo "FORCE_UPDATE=true" >> $GITHUB_OUTPUT
          else
            echo "FORCE_UPDATE=false" >> $GITHUB_OUTPUT
          fi
          # GH_TOKEN は引き続き ENV で OK（run 内でしか使わないため）
          echo "GH_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV

      # 1. spec.db の更新：手動実行時のみ（schedule時は実行しない）
      - name: Update spec.db
        if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'spec' || github.event.inputs.target == 'both') }}
        run: |
          cd cron
          # シェルの if ではなく、env に展開して判定する
          if [ "$FORCE_UPDATE" = "true" ]; then
            php .make.spec.php "update=1"
          else
            php .make.spec.php
          fi

      # 2. acis.db の更新：スケジュール実行時、または手動で acis/both が選ばれた時
      - name: Update acis.db
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'acis' || github.event.inputs.target == 'both')) }}
        run: |
          cd cron
          # シェルの if ではなく、env に展開して判定する
          if [ "$FORCE_UPDATE" = "true" ]; then
            php .make.acis.php "update=1"
          else
            php .make.acis.php
          fi

      # 3. コミットとプッシュ
      - name: Commit and Push changes
        id: commit
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # --- ここがポイント：acis.zip の変更を個別にチェック ---
          ACIS_CHANGED=false
          if git diff --name-only | grep -q "data/acis.zip"; then
            ACIS_CHANGED=true
          fi
          echo "acis_changed=$ACIS_CHANGED" >> $GITHUB_OUTPUT
          # --------------------------------------------------

          git add cron/*.zip cron/*.db cron/*.csv cron/*.txt cron/*.json data/*.*
          if ! git diff --staged --quiet; then
            git commit -m "Update DB and data files [skip ci]"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "No changes to commit"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      # 4. Pages デプロイ
      - name: Prepare Pages Artifact
        # 変更があった場合、または手動実行の場合に実行
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p staging/data
          # ルートの静的ファイルをコピー
          find . -maxdepth 1 -type f -exec cp {} staging/ \;
          # # -p で属性（タイムスタンプ）を保持して data ディレクトリの中身をコピー
          if [ -d "data" ]; then
            cp -rp data/* staging/data/ 2>/dev/null || true
          fi

      - name: Create Deployment Inventory
        run: |
          echo "=== ACFinder Database Deployment Inventory ===" > staging/data/inventory.txt
          echo "Deployment Time: $(date '+%Y-%m-%d %H:%M:%S JST')" >> staging/data/inventory.txt
          echo "GitHub Run ID: ${{ github.run_id }}" >> staging/data/inventory.txt
          echo "------------------------------------------" >> staging/data/inventory.txt
          # staging/data 内の全ファイルを詳細表示（ナノ秒まで）で追記
          ls -l --full-time staging/data/ >> staging/data/inventory.txt

      - name: Setup Pages
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/configure-pages@v4

      - name: Upload artifact
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v3
        with:
          path: './staging'

      - name: Deploy to GitHub Pages
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        id: deployment
        uses: actions/deploy-pages@v4

      # 5. update.json から情報を取得
      - name: Read update info
        id: info
        # acis.zip が変わった時だけ実行
        if: steps.commit.outputs.acis_changed == 'true'
        run: |
          VERSION_TAG=$(jq -r '.version_tag' cron/update.json)
          RAW_TITLE=$(jq -r '.raw_title' cron/update.json)
          UPDATE_DATE=$(jq -r '.update_date' cron/update.json)
          echo "tag=$VERSION_TAG" >> $GITHUB_OUTPUT
          echo "title=$RAW_TITLE" >> $GITHUB_OUTPUT
          echo "date=$UPDATE_DATE" >> $GITHUB_OUTPUT

      # 6. Release を作成/更新（acis.zip が変わった時だけ）
      - name: Create Release
        if: steps.commit.outputs.acis_changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.info.outputs.tag }}
          name: ${{ steps.info.outputs.title }}
          body: |
            自動更新によるデータベースアップデート
            更新日時: ${{ steps.info.outputs.date }}
          files: data/acis.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 7. 各拠点の同期スクリプトを叩く
      - name: Trigger Remote Sync
        # env ではなく steps.vars.outputs を参照
        if: steps.commit.outputs.acis_changed == 'true' || steps.vars.outputs.FORCE_UPDATE == 'true'
        run: |
          # run 内では環境変数として参照したいので、必要ならここで再定義するか
          # github.event.inputs を直接使うのが楽です
          OPT=""
          if [[ "${{ github.event.inputs.force_update }}" == "true" ]]; then
            OPT="?update=1"
          fi
          echo "Triggering sync with option: $OPT"

          # 各拠点の同期用PHPを叩く（.netrc設定済みなら認証もスムーズですね）
          #curl -s -u "${{ secrets.SYNC_USER }}:${{ secrets.SYNC_PASS }}" "https://macs.coresv.net/cron/.sync.data.php$OPT"
          #curl -s -u "${{ secrets.SYNC_USER }}:${{ secrets.SYNC_PASS }}" "https://macs.kabe.info/cron/.sync.data.php$OPT"
          #curl -s -u "${{ secrets.SYNC_USER }}:${{ secrets.SYNC_PASS }}" "https://noyaku.ebb.jp/cron/.sync.data.php$OPT"
