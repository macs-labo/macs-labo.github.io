name: Manual and Scheduled Database Update

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Update Target'
        required: true
        default: 'spec'
        type: choice
        options: [spec, acis, both]
      force_update:
        description: 'Force update (add update=1)'
        type: boolean
        default: false

  # スケジュール実行
  schedule:
    - cron: '2 0-6 * * 1-5' # 月-金 9-17時 02分 (JST)

permissions:
  contents: write

jobs:
  update-db:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, sqlite3, pdo_sqlite

      # 1. spec.db の更新：手動実行時のみ（schedule時は実行しない）
      - name: Update spec.db
        if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'spec' || github.event.inputs.target == 'both') }}
        run: |
          cd cron
          if [[ "${{ github.event.inputs.force_update }}" == "true" ]]; then
            php .make.spec.php "update=1"
          else
            php .make.spec.php
          fi

      # 2. acis.db の更新：スケジュール実行時、または手動で acis/both が選ばれた時
      - name: Update acis.db
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'acis' || github.event.inputs.target == 'both')) }}
        run: |
          cd cron
          # スケジュール実行時は通常更新、手動の時だけチェックボックスを見る
          if [[ "${{ github.event.inputs.force_update }}" == "true" ]]; then
            php .make.acis.php "update=1"
          else
            php .make.acis.php
          fi

      # 3. コミットとプッシュ
      - name: Commit and Push changes
        id: commit
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add cron/*.db cron/*.csv cron/*.json data/*.zip data/*.txt
          if ! git diff --staged --quiet; then
            git commit -m "Update DB and data files [skip ci]"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "No changes to commit"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      # 4. update.json から情報を取得
      - name: Read update info
        id: info
        if: steps.commit.outputs.changed == 'true'
        run: |
          # jq を使って JSON の値を環境変数に抽出
          VERSION_TAG=$(jq -r '.version_tag' cron/update.json)
          RAW_TITLE=$(jq -r '.raw_title' cron/update.json)
          UPDATE_DATE=$(jq -r '.update_date' cron/update.json)
          
          # 後続のステップで使えるように出力にセット
          echo "tag=$VERSION_TAG" >> $GITHUB_OUTPUT
          echo "title=$RAW_TITLE" >> $GITHUB_OUTPUT
          echo "date=$UPDATE_DATE" >> $GITHUB_OUTPUT

      # 5. Release を作成/更新して zip をアップロード
      - name: Create Release
        if: steps.commit.outputs.changed == 'true' && (github.event_name == 'schedule' || github.event.inputs.target == 'acis' || github.event.inputs.target == 'both')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.info.outputs.tag }}  # "v2026.02.99"
          name: ${{ steps.info.outputs.title }}     # "2026年02月失効反映分"
          body: |
            自動更新によるデータベースアップデート
            更新日時: ${{ steps.info.outputs.date }}
          files: data/acis.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
