name: Manual and Scheduled Database Update

on:
  # 手動実行用
  workflow_dispatch:
    inputs:
      target:
        description: 'Update Target'
        required: true
        default: 'both'
        type: choice
        options: [acis, spec, both]
  
  # 自動実行用（例：毎日 日本時間 朝5時 / UTC 20:00）
  # 設定を有効にする場合は下の2行のコメントアウト（#）を外してください
  # schedule:
  #   - cron: '0 20 * * *'

permissions:
  contents: write

jobs:
  update-db:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, sqlite3, pdo_sqlite

      # 1. spec.db の更新 (acis の参照用)
      - name: Update spec.db
        if: ${{ github.event.inputs.target == 'spec' || github.event.inputs.target == 'both' || github.event == 'schedule' }}
        run: |
          cd cron
          php .make.spec.php

      # 2. acis.db および data/ 内のファイル生成
      - name: Update acis.db and Data files
        if: ${{ github.event.inputs.target == 'acis' || github.event.inputs.target == 'both' || github.event == 'schedule' }}
        run: |
          cd cron
          php .make.acis.php

      # 3. コミットとプッシュ (cron/*.db, data/*.zip, data/*.txt を対象)
      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 指定されたファイルをすべてステージング
          git add cron/*.db
          git add data/*.zip
          git add data/*.txt
          
          # 変更がある場合のみコミット
          if ! git diff --staged --quiet; then
            git commit -m "Update DB and data files via GitHub Actions"
            git push
          else
            echo "No changes to commit"
          fi
