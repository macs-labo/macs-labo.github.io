name: MACS-labo Site Deploy (Manual)

on:
  # 手動実行のみに制限
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # タイムスタンプ復元のために全履歴を取得

      - name: Restore timestamps
        uses: chetan/git-restore-mtime-action@v2

      - name: Prepare Artifact
        run: |
          # 1. 配信用の staging ディレクトリ構造を作成
          mkdir -p staging/data
          mkdir -p staging/macs
          
          # 2. ルートにある静的ファイル (html, js, png等) を属性保持してコピー
          # -a (archive) は -p (preserve) を含み、より強力に属性を維持します
          find . -maxdepth 1 -type f -not -name ".*" -exec cp -a {} staging/ \;

          # 3. 指定ディレクトリのみを再帰的に属性保持してコピー
          if [ -d "data" ]; then
            cp -a data/*.html staging/data/
          fi

          # 4. (デバッグ用) 実際にコピーされた zip の時刻を確認
          echo "=== Final Timestamp Check in Staging ==="
          ls -l --full-time staging/data/*.zip || echo "No zip files found"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './staging'
          
      - name: Deploy
        uses: actions/deploy-pages@v4
