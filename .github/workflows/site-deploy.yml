name: MACS-labo Site Deploy (Manual)

on:
  # 手動実行のみに制限
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # タイムスタンプ復元のために全履歴を取得

      - name: Restore timestamps
        uses: chetan/git-restore-mtime-action@v2

      - name: Prepare Artifact
        run: |
          mkdir -p staging/data
          mkdir -p staging/macs
          
          # -p オプションで Git 上のタイムスタンプを維持してコピー
          # ルートのファイル
          find . -maxdepth 1 -type f -exec cp -p {} staging/ \;
          
          # data ディレクトリ（リポジトリ内にある静的HTMLなど）
          if [ -d "data" ]; then
            cp -rp data/* staging/data/ 2>/dev/null || true
          fi
          
          # macs ディレクトリ
          if [ -d "macs" ]; then
            cp -rp macs/* staging/macs/ 2>/dev/null || true
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './staging'
          
      - name: Deploy
        uses: actions/deploy-pages@v4
