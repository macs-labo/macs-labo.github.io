name: MacsDB CRON Job Updater Global Deploy

on:
  push:
    paths:
      - 'cron.zip' # cron.zip の push で発動
  workflow_dispatch:
    inputs:
      run_mode:
        description: '実行モード'
        type: choice
        options:
          - 'full_deploy'  # ZIP展開 ＋ リポジトリ更新 ＋ サーバー同期
          - 'sync_only'    # サーバー同期のみ
        default: 'full_deploy'
      force_update:
        description: '強制更新（?update=1）しますか？'
        type: boolean
        default: false

jobs:
  deploy:
    env:
      TARGET_ZIP: "cron.zip"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Process ZIP and Update Repository
        # Push時、または手動で full_deploy を選択した時のみ実行
        if: github.event_name == 'push' || github.event.inputs.run_mode == 'full_deploy'
        run: |
          # ZIPを解凍してリポジトリを展開
          unzip -o "$TARGET_ZIP" -d ./
          
          # GitHubにコミット（[skip ci] で無限ループを鉄壁にガード）
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git diff --cached --quiet || git commit -m "Auto deploy from $TARGET_ZIP [skip ci]"
          git push

      - name: Trigger Remote Sync
        run: |
          # 強制更新オプションの判定
          OPT=""
          if [ "${{ github.event.inputs.force_update }}" == "true" ]; then
            OPT="?update=1"
          fi

          echo "Triggering sync with option: $OPT"

          # 登録した Secret を使用して各拠点を叩く
          curl -s -u "${{ secrets.SYNC_USER }}:${{ secrets.SYNC_PASS }}" "https://macs.xii.jp/acfinder/.sync.acfinder.php$OPT"
          #curl -s -u "${{ secrets.SYNC_USER }}:${{ secrets.SYNC_PASS }}" "https://macs.kabe.info/acfinder/.sync.acfinder.php$OPT"
          #curl -s -u "${{ secrets.SYNC_USER }}:${{ secrets.SYNC_PASS }}" "https://noyaku.ebb.jp/acfinder/.sync.acfinder.php$OPT"name: Dynamic Version Deploy
