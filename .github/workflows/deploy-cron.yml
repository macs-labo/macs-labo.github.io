name: MacsDB CRON Job Updater Global Deploy

on:
  push:
    paths:
      - 'cron/**'
  workflow_dispatch:
    inputs:
      run_mode:
        description: '実行モード'
        type: choice
        options:
          - 'full_deploy'
          - 'sync_only'
        default: 'full_deploy'
      force_update:
        description: '強制更新（?update=1）しますか？'
        type: boolean
        default: false

jobs:
  deploy:
    permissions:
      contents: write      # リポジトリへの git push に必要
      pages: write         # Pages のデプロイに必要
      id-token: write      # GitHub Pages の認証（OIDC）に必要
    env:
      TARGET_ZIP: "cron.zip"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Process ZIP and Update Repository
        if: github.event_name == 'push' || github.event.inputs.run_mode == 'full_deploy'
        run: |
          cd cron
          if [ -f "${{ env.TARGET_ZIP }}" ]; then
            unzip -o "${{ env.TARGET_ZIP }}" -d ./
            
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add .
            # ここは [skip ci] だけにする（[pages skip] は入れない）
            # これにより、このプッシュで「1回だけ」正しく Pages ビルドが走ります
            git diff --cached --quiet || git commit -m "Auto deploy from ${{ env.TARGET_ZIP }} [skip ci]"
            git push
          else
            echo "Notice: ${{ env.TARGET_ZIP }} not found. Skipping."
          fi

      - name: Prepare Pages Artifact
        run: |
          # 1. 空の公開用フォルダ（staging）を作成
          mkdir -p staging/data
          
          # 2. ルートにあるファイル（index.html等）のみをコピー（cronディレクトリを除外）
          find . -maxdepth 1 -type f -exec cp {} staging/ \;
          
          # 3. dataディレクトリの中身をコピー
          if [ -d "data" ]; then
            cp -r data/* staging/data/ 2>/dev/null || true
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # リポジトリルートではなく、今作った staging を指定
          path: './staging'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Trigger Remote Sync
        run: |
          OPT=""
          if [ "${{ github.event.inputs.force_update }}" == "true" ]; then
            OPT="?update=1"
          fi

          echo "Triggering sync with option: $OPT"

          # 各拠点を叩く（コメントアウトされた行も整理）
          # curl -s -u "${{ secrets.SYNC_USER }}:${{ secrets.SYNC_PASS }}" "https://macs.xii.jp/acfinder/.sync.cron.php$OPT"
          curl -s -u "${{ secrets.SYNC_USER }}:${{ secrets.SYNC_PASS }}" "https://macs.kabe.info/acfinder/.sync.cron.php$OPT"
          curl -s -u "${{ secrets.SYNC_USER }}:${{ secrets.SYNC_PASS }}" "https://noyaku.ebb.jp/acfinder/.sync.cron.php$OPT"
