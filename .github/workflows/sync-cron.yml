name: Sync MacsDB Update CRON Job

on:
  push:
    paths:
      - 'cron/cron.zip' # 職場からの手動アップロードやPushで自動実行
  workflow_dispatch:
    inputs:
      run_mode:
        description: '実行モード'
        type: choice
        options:
          - 'full_sync'      # リポジトリ展開 ＋ 姉妹サイト同期
          - 'github_only'    # リポジトリ展開のみ（動作確認用）
          - 'site_sync_only' # 姉妹サイト同期のみ（再試行用）
        default: 'full_sync'
      force_update:
        description: '強制更新（?update=1）しますか？'
        type: boolean
        default: false

jobs:
  sync:
    permissions:
      contents: write
    env:
      TARGET_ZIP: "cron.zip"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- STEP 1: リポジトリ内のファイルを ZIP から展開 ---
      - name: Process ZIP and Update Repository
        # push時、または run_mode が full_sync か github_only の時に実行
        if: |
          github.event_name == 'push' || 
          github.event.inputs.run_mode == 'full_sync' || 
          github.event.inputs.run_mode == 'github_only'
        run: |
          cd cron
          if [ -f "${{ env.TARGET_ZIP }}" ]; then
            unzip -o "${{ env.TARGET_ZIP }}" -d ./
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add -A .
            if ! git diff --cached --quiet; then
              git commit -m "Auto sync from ${{ env.TARGET_ZIP }} [skip ci]"
              git push
            fi
          else
            echo "Error: ${{ env.TARGET_ZIP }} not found."
            exit 1
          fi

      # --- STEP 2: 姉妹サイト（外部サーバー）を叩く ---
      - name: Trigger Remote Sync
        # 明示的に 'full_sync' か 'site_sync_only' が選ばれた時だけ実行する
        # (push イベントの時は inputs が空なので、ここは自動的に false になります)
        if: |
          github.event.inputs.run_mode == 'full_sync' || 
          github.event.inputs.run_mode == 'site_sync_only'
        run: |
          OPT=""
          if [ "${{ github.event.inputs.force_update }}" == "true" ]; then
            OPT="?update=1"
          fi
          echo "Triggering sync with option: $OPT"
          curl -s -u "${{ secrets.SYNC_USER }}:${{ secrets.SYNC_PASS }}" "https://macs.kabe.info/cron/.sync.cron.php$OPT"
          curl -s -u "${{ secrets.SYNC_USER }}:${{ secrets.SYNC_PASS }}" "https://noyaku.ebb.jp/cron/.sync.cron.php$OPT"
          curl -s -u "${{ secrets.SYNC_USER }}:${{ secrets.SYNC_PASS }}" "https://macs.coresv.net/cron/.sync.cron.php$OPT"
