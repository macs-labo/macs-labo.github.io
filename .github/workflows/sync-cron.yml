name: Sync MacsDB Update CRON Job

on:
  push:
    paths:
      - 'cron/cron.zip' # 職場からの手動アップロードやPushで自動実行
  workflow_dispatch:
    inputs:
      run_mode:
        description: '実行モード'
        type: choice
        options:
          - 'full_sync'      # リポジトリ展開 ＋ 姉妹サイト同期
          - 'github_only'    # リポジトリ展開のみ
          - 'site_sync_only' # 姉妹サイト同期のみ
        default: 'full_sync'
      force_update:
        description: '強制更新（?update=1）しますか？'
        type: boolean
        default: false

jobs:
  sync:
    permissions:
      contents: write
    env:
      TARGET_ZIP: "cron.zip"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- STEP 1: リポジトリ内のファイルを ZIP から展開 ---
      - name: Process ZIP and Update Repository
        id: process_zip # IDを追加（変更検知のため）
        if: |
          github.event_name == 'push' || 
          github.event.inputs.run_mode == 'full_sync' || 
          github.event.inputs.run_mode == 'github_only'
        run: |
          cd cron
          if [ -f "${{ env.TARGET_ZIP }}" ]; then
            unzip -o "${{ env.TARGET_ZIP }}" -d ./
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add -A .
            if ! git diff --cached --quiet; then
              git commit -m "Auto sync from ${{ env.TARGET_ZIP }} [skip ci]"
              git push
              echo "pushed=true" >> $GITHUB_OUTPUT
            else
              echo "No changes to commit"
              echo "pushed=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "Error: ${{ env.TARGET_ZIP }} not found."
            exit 1
          fi

      # --- STEP 2: 姉妹サイト（外部サーバー）を叩く ---
      - name: Trigger Remote Sync
        # push時、または明示的に 'full_sync' か 'site_sync_only' が選ばれた時に実行
        if: |
          github.event_name == 'push' ||
          github.event.inputs.run_mode == 'full_sync' || 
          github.event.inputs.run_mode == 'site_sync_only'
        run: |
          # GitHub CDN の反映待ち
          # push 時、または run_mode が 'full_sync' か 'github_only' の場合のみ待機
          if [[ "${{ github.event_name }}" == "push" || "${{ github.event.inputs.run_mode }}" == "full_sync" ]]; then
            echo "Waiting 120 seconds for GitHub to reflect changes..."
            sleep 120
          fi

          # 1. 強制更新フラグの付与
          if [[ "${{ github.event.inputs.force_update }}" == "true" ]]; then
            if [[ -n "$QUERY" ]]; then QUERY="${QUERY}&update=1"; else QUERY="update=1"; fi
          fi

          # 2. URL末尾の調整
          OPT=""
          if [[ -n "$QUERY" ]]; then OPT="?$QUERY"; fi

          echo "Triggering sync with URL suffix: $OPT"

          # 3. curl オプションの設定
          CURL_OPTS=(
            -s 
            -u "${{ secrets.SYNC_USER }}:${{ secrets.SYNC_PASS }}" 
            -H "X-GitHub-Token: ${{ secrets.GITHUB_TOKEN }}"
          )

          curl "${CURL_OPTS[@]}" "https://macs.kabe.info/cron/.sync.cron.php$OPT"
          curl "${CURL_OPTS[@]}" "https://noyaku.ebb.jp/cron/.sync.cron.php$OPT"
          curl "${CURL_OPTS[@]}" "https://macs.coresv.net/cron/.sync.cron.php$OPT"
