name: Sync MacsDB Update CRON Job

on:
  push:
    paths:
      - 'cron/**'
  workflow_dispatch:
    inputs:
      run_mode:
        description: '実行モード'
        type: choice
        options:
          - 'full_sync'
          - 'site_sync_only'
        default: 'full_sync'
      force_update:
        description: '強制更新（?update=1）しますか？'
        type: boolean
        default: false

jobs:
  sync: # ジョブ名も 'deploy' から 'sync' などに変えると分かりやすいです
    permissions:
      contents: write # リポジトリへの Push 権限のみ残す
    env:
      TARGET_ZIP: "cron.zip"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Process ZIP and Update Repository
        if: github.event_name == 'push' || github.event.inputs.run_mode == 'full_deploy'
        run: |
          cd cron
          if [ -f "${{ env.TARGET_ZIP }}" ]; then
            unzip -o "${{ env.TARGET_ZIP }}" -d ./
            
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add .
            # [skip ci] を入れることで、この Push で deploy-site.yml が連鎖起動するのを防ぎます
            git diff --cached --quiet || git commit -m "Auto sync from ${{ env.TARGET_ZIP }} [skip ci]"
            git push
          else
            echo "Notice: ${{ env.TARGET_ZIP }} not found. Skipping."
          fi

      - name: Trigger Remote Sync
        run: |
          OPT=""
          if [ "${{ github.event.inputs.force_update }}" == "true" ]; then
            # 変数展開の修正：$OPT ではなく OPT
            OPT="?update=1"
          fi

          echo "Triggering sync with option: $OPT"

          # 各拠点を叩く
          curl -s -u "${{ secrets.SYNC_USER }}:${{ secrets.SYNC_PASS }}" "https://macs.coresv.net/cron/.sync.cron.php$OPT"
          curl -s -u "${{ secrets.SYNC_USER }}:${{ secrets.SYNC_PASS }}" "https://macs.kabe.info/cron/.sync.cron.php$OPT"
          curl -s -u "${{ secrets.SYNC_USER }}:${{ secrets.SYNC_PASS }}" "https://noyaku.ebb.jp/cron/.sync.cron.php$OPT"
