<!DOCTYPE html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>携帯農薬検索実験室</title>
<script type="text/javascript" src="../setup.js"></script>
<script type="text/javascript" src="../common.js"></script>
<script>
async function filemtime(file) {
  try {
    let lastModified;

    if (file.includes('raw.githubusercontent.com')) {
      // GitHub APIを使用してコミット情報を取得
      // URL例: https://raw.githubusercontent.com/user/repo/main/path/to/file
      // API例: https://api.github.com/repos/user/repo/commits?path=path/to/file&page=1&per_page=1
      const parts = file.replace('https://raw.githubusercontent.com/', '').split('/');
      const owner = parts[0];
      const repo = parts[1];
      const branch = parts[2];
      const filePath = parts.slice(3).join('/');

      const apiUrl = `https://api.github.com/repos/${owner}/${repo}/commits?path=${filePath}&sha=${branch}&per_page=1`;
      
      const response = await fetch(apiUrl, { cache: 'no-cache' });
      if (!response.ok) return '';
      
      const commits = await response.json();
      if (commits && commits.length > 0) {
        lastModified = commits[0].commit.committer.date; // ISO 8601形式 (e.g. 2023-10-01T12:00:00Z)
      } else {
        return '';
      }
    } else {
      // 通常のHTTP HEADリクエスト
      const response = await fetch(file, { method: 'HEAD', cache: 'no-cache' });
      if (!response.ok) return '';
      lastModified = response.headers.get('Last-Modified');
    }

    if (!lastModified) return '';

    const mtime = new Date(lastModified);
    const prop = { 
      timeZone: 'Asia/Tokyo', 
      year: 'numeric', 
      month: '2-digit', 
      day: '2-digit', 
      hour12: false, 
      hour: '2-digit', 
      minute: '2-digit' 
    };

    let date = mtime.toLocaleString('ja-JP', prop).replace(/\//g, '.').slice(0, 16);
    
    // 3日以内の場合に New! を付ける
    if (new Date() - mtime < 60 * 60 * 24 * 3 * 1000) {
      date += " <em>New!</em>";
    }

    return date;
  } catch (e) {
    console.error("Fetchエラー:", e);
    return '';
  }
}

async function fetchSjisText(url) {
  try {
    const response = await fetch(url);
    
    if (!response.ok) {
      throw new Error(`HTTPエラー! ステータス: ${response.status}`);
    }

    // レスポンスをバイナリデータ（ArrayBuffer）として取得
    const buffer = await response.arrayBuffer();

    // TextDecoder を 'shift-jis' (または 'windows-31j' / 'cp932') で初期化
    // ※ 'shift-jis' を指定しても、モダンブラウザは通常 CP932 として処理します
    const decoder = new TextDecoder('shift-jis');

    // バイナリをデコードして文字列として返す
    const text = decoder.decode(buffer);
    
    return text;
  } catch (error) {
    console.error('フェッチまたはデコード中にエラーが発生しました:', error);
    return null;
  }
}

const datadir = window.location.href.includes('github.io') ? 'https://raw.githubusercontent.com/macs-labo/macs-labo.github.io/main/data' : '.';

let main = '';
// filemtime 関数は DOMContentLoaded 後に呼び出さないと NetworkError になるため、common.js から initVars 関数を呼び出す
const initVars = async () => {
  const [update, toroku, acis, spec] = await Promise.all([
    filemtime(`${datadir}/update.txt`),
    filemtime(`${datadir}/toroku.zip`),
    filemtime(`${datadir}/acis.zip`),
    filemtime(`${datadir}/spec.zip`)
  ]);

  const dbdate = await fetchSjisText(`${datadir}/update.txt`);

  main = `
  <h3>${dbdate}</h3>
  <h4>CSV形式</h4>
  <p><button type="button" class="help" onclick="location.href='./help.html?file=toroku'">１</button><a href="${datadir}/toroku.zip" class="file">toroku.zip</a>${toroku}</p>
  <h4>SQLite形式</h4>
  <p><button type="button" class="help" onclick="location.href='./help.html?file=acis'">２</button><a href="${datadir}/acis.zip" class="file">acis.zip</a>${acis}</p>
  <p><button type="button" class="help" onclick="location.href='./help.html?file=spec'">３</button><a href="${datadir}/spec.zip" class="file">spec.zip</a>${spec}</p>
  <h4>更新情報</h4>
  <p><button type="button" class="help" onclick="location.href='./help.html?file=update'">４</button><a href="${datadir}/update.ptxt" class="file">update.txt</a>${update}</p>
  `;
};

const navi = `<p><button type="button" class="jump" onclick="location.href='../'">⋘ ${sitename}${branch}</button></p>\n`;

</script>
