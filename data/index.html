<!DOCTYPE html>

<script type="text/javascript" src="../common.js"></script>
<script>
async function filemtime(file) {
  try {
    const response = await fetch(file, { method: 'HEAD', cache: 'no-cache' });
    if (!response.ok) return '';
    const lastModified = response.headers.get('Last-Modified');
    if (!lastModified) return '';
    const mtime = new Date(lastModified);
    const prop = { timeZone: 'Asia/Tokyo', year: 'numeric', month: '2-digit', day: '2-digit', hour12: false, hour: '2-digit', minute: '2-digit' };
    let date = mtime.toLocaleString('ja-JP', prop).replace(/\//g, '.').slice(0, 16);
    if (new Date() - mtime < 60*60*24*3*1000) date += " <em>New!</em>";
    return date;
  } catch (e) {
    console.error("Fetchエラー:", e);
    return '';
  }
}

const style = `
em {
  color: red;
}
.file {
  display: inline-block;
  text-decoration: none;
  text-align: center;
  font-weight: bold;
  background: #c1e0ff;
  border-radius: 1.0em;

  ]);

  <p><button type="button" class="help" onclick="location.href='./help.html?file=acis'">２</button><a href="./acis.zip" class="file">acis.zip</a>${acis}</p>
  <p><button type="button" class="help" onclick="location.href='./help.html?file=spec'">３</button><a href="./spec.zip" class="file">spec.zip</a>${spec}</p>
  `;
};

const navi = `<p><button type="button" class="jump" onclick="location.href='../'">⋘ ${sitename}${branch}</button></p>\n`;

</script>
