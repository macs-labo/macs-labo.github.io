<h4>本サービスについて</h4>
<p>　本サービスでは、FAMIC(独立行政法人農林水産消費安全技術センター)の許可をいただいて、FAMIC が公開している<A href="https://www.acis.famic.go.jp/ddata/index2.htm" target="_blank">農薬登録情報 CSV データ</a>を一般的な DBMS (データベースマネージメントシステム)等で扱いやすい CSV 形式に変換して提供します。
本データを使うと、FAMIC CSV データより高速なデータベースの構築が可能となり、CRON ジョブや CGI の実行にリソース制限があるレンタルサーバ等でも扱いやすくなります。</p>
<p>　本サービスは、欄外の注意事項をご了承いただければ、個人や組織内での利用に限って、誰でも自由に無料で利用することができます。
ただし、本サービスのデータを使用したウェブ検索システム等で不特定多数が使用するような場合は、別途 FAMIC の許諾を得る必要があります。</p>
<h4>ファイル構成</h4>
<p>　本サービスで提供する ${file}.zip は、下記の３ファイルで構成されます。</p>
<ul>
<li>update.txt： CSV ダウンロードページのデータタイトル</li>
<li>kihon.csv： 「登録基本部」の CSV を MACS 形式に変換</li>
<li>tekiyo.csv： 「登録適用部一」「登録適用部二」の CSV を MACS 形式に変換</li>
</ul>
<h4>文字セット</h4>
<p>　${file}.zip 内のファイルの文字セットは、全て Shift_JIS です。
半角カタカナは全角カタカナに、全角「（）［］」はそれぞれ半角「() []」に、さらに「①②㍑㍍㌢㎝㎜㎏」等の環境依存文字はそれぞれ「(1) (2) L m cm cm mm kg」に変換しています。

<p>　なお、エンコード変換する場合、変換元の文字セットは CP932 (perl なら 'cp932'、PHP なら 'sjis-win')を指定することをお勧めします。</p>
<h4>CSV フォーマット</h4>
<p>　フィールドセパレータはカンマ(,)、レコードセパレータは CR+LF です。
DBMS の SQL 文で扱いやすい形式にしたため、一般的な CSV とは下記の点で異なります。</p>
<ul>
<li>数値フィールドは引用符無し、文字列フィールドはカンマを含まない場合も全て引用符で囲まれています。</li>
<li>引用符は、ダブルクォート(&quot;)ではなく、シングルクォート(')です。</li>
<li>ヌルフィールドは引用符無しで「NULL」となっています。</li>
</ul>
<h4>データ更新</h4>
<p>　FAMIC CSV データの更新チェックは、月〜金曜日の 9～17 時に１時間に１回行います。
このタイミングで FAMIC のデータが更新されていれば、数分後に本サービスのデータも更新されます。</p>
<p>　このページを介さずに、プログラム等から直接本ファイルをダウンロードする場合、まず本ファイルの更新チェックをして、更新されている場合のみダウンロードするのが効率的です。

`;
